# Prometheus config for POC copy 5.
# Scrapes the OTel Collector's Prometheus exporter (:8889) which carries
# the app's ai.llm.* / cache.dragonfly.* / ai.cache.* / ai.tool.* metrics.

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: v1nextgen-otel-collector
    static_configs:
      - targets: ["v1nextgen-otel-collector:8889"]

  - job_name: v1nextgen-nats
    static_configs:
      - targets: ["v1nextgen-nats-exporter:7777"]
