# Grafana dashboard provisioning — load every JSON in /etc/grafana/
# dashboards/ at container boot and watch for changes (no manual
# import). Editable=false: dashboards are version-controlled artifacts;
# operators clone-and-modify rather than mutating in place.
apiVersion: 1
providers:
  - name: oneops-dashboards
    orgId: 1
    folder: OneOps
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/dashboards
