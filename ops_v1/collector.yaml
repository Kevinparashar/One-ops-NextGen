# OTel Collector config for POC copy 5.
#
# Role: receive OTLP from the app, fan out:
#   - traces  → Tempo (v1nextgen-tempo:4318)
#   - metrics → Prometheus scrape endpoint (exposed on :8889)
#
# This closes gap G5: the app emits ai.llm.tokens.cached.total,
# cache.dragonfly.* etc., but Tempo only accepts traces. The collector
# bridges metrics to a Prometheus-scrapable endpoint.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s
  memory_limiter:
    check_interval: 2s
    limit_mib: 256
    spike_limit_mib: 64

exporters:
  # Traces → Tempo (container-internal name).
  otlphttp/tempo:
    endpoint: http://v1nextgen-tempo:4318
  # Metrics → Prometheus scrape endpoint on :8889.
  prometheus:
    endpoint: 0.0.0.0:8889
    # Keep metric names stable for dashboards.
    resource_to_telemetry_conversion:
      enabled: true
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]
