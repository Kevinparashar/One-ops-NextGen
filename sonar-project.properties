# SonarQube scope — whole repo (sonar.sources=.), noise/data/vendor excluded.
#
# Run the scanner FROM this directory; it uses cwd as projectBaseDir and never
# climbs above it. Pass server URL + token at run time (no secret in the repo):
#   docker run --rm --network host -v "$(pwd):/usr/src" \
#     -e SONAR_HOST_URL=http://localhost:9000 -e SONAR_TOKEN=<token> \
#     sonarsource/sonar-scanner-cli
# IDE (SonarLint): open THIS folder as the workspace root + bind to this key.

sonar.projectKey=oneops-nextgen-v1
sonar.projectName=Oneops-NextGen V1
sonar.projectVersion=0.2.0
sonar.sourceEncoding=UTF-8

# ── whole repo ───────────────────────────────────────────────────────────────
sonar.sources=.
sonar.tests=tests
sonar.python.version=3.12

# ── exclude vendor / generated / config-data / prose (NOT app code) ──────────
# ops/ is INCLUDED per scope decision (infra code scanned too).
sonar.exclusions=\
  .venv/**, **/__pycache__/**, **/*.pyc, \
  .git/**, .pytest_cache/**, .ruff_cache/**, .mypy_cache/**, \
  .claude/**, .vscode/**, \
  build/**, dist/**, htmlcov/**, **/*.egg-info/**, **/node_modules/**, \
  **/*_pb2.py, **/*_pb2_grpc.py, \
  proto/**, contracts/**, registries/**, data/**, \
  docs/**, langgraph_docs/**

# Tests analyzed under the test rule profile (not flagged as app code).
sonar.test.inclusions=tests/**

# Keep test/script/db/dev code out of the runtime package's coverage number.
sonar.coverage.exclusions=tests/**, scripts/**, database/**, dev/**, ops/**
