# OTel Collector config for Oneops-NextGen.
#
# Role: receive OTLP from the app, fan out:
#   - traces  → Tempo (nextgen-tempo:4318)         — full fidelity, always on
#   - traces  → Langfuse (langfuse-web:3000)        — filtered query-flow view,
#               BEST-EFFORT (only resolves when the `langfuse` compose profile
#               is up; otherwise spans queue then drop — never blocks Tempo or
#               the request path).
#   - metrics → Prometheus scrape endpoint (exposed on :8889)
#
# This closes gap G5: the app emits ai.llm.tokens.cached.total,
# cache.dragonfly.* etc., but Tempo only accepts traces. The collector
# bridges metrics to a Prometheus-scrapable endpoint.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s
  memory_limiter:
    check_interval: 2s
    limit_mib: 256
    spike_limit_mib: 64
  # Langfuse-only noise filter: drop pure-infrastructure spans so the Langfuse
  # Agent Graph shows the QUERY FLOW (ingress → router → agent → tool → LLM),
  # not raw SQL. Tempo keeps EVERYTHING (this processor is on the langfuse
  # pipeline only). Drops: asyncpg DB spans (bare SELECT/INSERT/… that arrive as
  # their own 1-span traces) and the standalone session-lifecycle touch span.
  filter/langfuse:
    error_mode: ignore
    traces:
      span:
        # asyncpg DB spans (bare SELECT/INSERT/… — noise as 1-span traces).
        - 'attributes["db.system"] != nil'
        # cache get/set spans (uc01.cache_aside.get, etc.).
        - 'IsMatch(name, "cache_aside")'
        # NATS transport mechanics (request/process/resilient_call + publish).
        - 'name == "nats.request"'
        - 'name == "nats.process"'
        - 'name == "nats.resilient_call"'
        - 'name == "oneops.nats_invoke"'
        # auth re-checks (yes/no gate, repeats per step).
        - 'name == "authz.check"'
        # session store + checkpointer plumbing (no semantic I/O).
        - 'IsMatch(name, "^session")'
        - 'name == "executor.update_focus"'
        - 'name == "executor.load_session"'
        - 'name == "executor.persist"'

exporters:
  # Traces → Tempo (container-internal name).
  otlphttp/tempo:
    endpoint: http://nextgen-tempo:4318
  # Traces → self-hosted Langfuse OTLP (HTTP/protobuf; the collector appends
  # /v1/traces → /api/public/otel/v1/traces). Auth via env (base64 of pk:sk).
  # BEST-EFFORT: if Langfuse is down (or the `langfuse` profile isn't up) the
  # spans queue then drop — this NEVER blocks the Tempo exporter or the request
  # path. This is the dual fan-out; Tempo stays the source of truth for timing.
  otlphttp/langfuse:
    endpoint: http://langfuse-web:3000/api/public/otel
    headers:
      Authorization: "Basic ${env:LANGFUSE_OTEL_AUTH}"
    sending_queue:
      enabled: true
      queue_size: 1000
    retry_on_failure:
      enabled: true
      initial_interval: 2s
      max_interval: 30s
      max_elapsed_time: 120s
  # Metrics → Prometheus scrape endpoint on :8889.
  prometheus:
    endpoint: 0.0.0.0:8889
    # Keep metric names stable for dashboards.
    resource_to_telemetry_conversion:
      enabled: true
  debug:
    verbosity: basic

service:
  pipelines:
    # Tempo gets EVERYTHING (full timing fidelity, incl. DB spans).
    traces/tempo:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/tempo, debug]
    # Langfuse gets the FILTERED set (query-flow view, no SQL/infra noise).
    # Best-effort — harmless when the `langfuse` profile is not running.
    traces/langfuse:
      receivers: [otlp]
      processors: [memory_limiter, filter/langfuse, batch]
      exporters: [otlphttp/langfuse]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]
