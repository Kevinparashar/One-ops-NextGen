# Alert routing — every firing rule lands at `oneops-default` for
# now. Production splits by severity: critical → PagerDuty;
# warning → Slack; info → email digest. Same provisioning file,
# different child policies.
apiVersion: 1
policies:
  - orgId: 1
    receiver: oneops-default
    group_by: ["grafana_folder", "alertname", "tenant_id"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
